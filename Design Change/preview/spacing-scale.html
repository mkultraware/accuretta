<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 28px;}
  .row { display:flex; align-items:center; gap:12px; margin-bottom:4px;}
  .tok { font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--fg-muted); width:44px;}
  .px { font-family:var(--font-mono); font-size:10px; color:var(--fg-faint); width:36px; text-align:right;}
  .bar { background: var(--ember-2); height: 10px; border-radius: 2px;}
  .tick { height: 10px; width:1px; background: var(--gray-20);}
</style>
</head>
<body>
  <div class="row"><span class="tok">s-1</span><span class="px">4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tok">s-2</span><span class="px">8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tok">s-3</span><span class="px">12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tok">s-4</span><span class="px">16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tok">s-5</span><span class="px">20</span><div class="bar" style="width:20px"></div></div>
  <div class="row"><span class="tok">s-6</span><span class="px">24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tok">s-8</span><span class="px">32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tok">s-10</span><span class="px">40</span><div class="bar" style="width:40px"></div></div>
  <div class="row"><span class="tok">s-12</span><span class="px">48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tok">s-16</span><span class="px">64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="tok">s-20</span><span class="px">80</span><div class="bar" style="width:80px"></div></div>
</body>
</html>
