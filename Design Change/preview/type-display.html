<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .meta {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--fg-muted);
    min-width: 72px;
  }
  .big {
    font-family: var(--font-display);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 0.95;
    color: var(--fg);
  }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="meta">Display / 88</span>
      <span class="big" style="font-size:88px;">Accuretta</span>
    </div>
    <div class="row"><span class="meta">H1 / 64</span>
      <span class="big" style="font-size:64px;">Local agents</span>
    </div>
    <div class="row"><span class="meta">H2 / 36</span>
      <span class="big" style="font-size:36px; font-family:var(--font-mono); font-weight:600; letter-spacing:-0.02em;">Prerender HTML, instantly.</span>
    </div>
  </div>
</body>
</html>
