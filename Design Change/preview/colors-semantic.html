<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px;}
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;}
  .tile {
    aspect-ratio: 1.1 / 1;
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-family: var(--font-mono);
    border: 1px solid var(--border);
  }
  .tile .nm { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;}
  .tile .val { font-size: 10px; opacity: 0.7;}
  .dot {
    width: 18px; height: 18px; border-radius: 999px;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile" style="background:var(--accent-subtle); color:#5A3A1E">
      <div class="dot" style="background:var(--accent)"></div>
      <div><div class="nm">Accent</div><div class="val">Ember</div></div>
    </div>
    <div class="tile" style="background:var(--success-subtle); color:#1D4732">
      <div class="dot" style="background:var(--success)"></div>
      <div><div class="nm">Success</div><div class="val">Mint</div></div>
    </div>
    <div class="tile" style="background:var(--info-subtle); color:#3A2E5A">
      <div class="dot" style="background:var(--info)"></div>
      <div><div class="nm">Info</div><div class="val">Lilac</div></div>
    </div>
    <div class="tile" style="background:var(--warning-subtle); color:#6B571A">
      <div class="dot" style="background:var(--warning)"></div>
      <div><div class="nm">Warning</div><div class="val">Lemon</div></div>
    </div>
    <div class="tile" style="background:var(--danger-subtle); color:#6B2544">
      <div class="dot" style="background:var(--danger)"></div>
      <div><div class="nm">Danger</div><div class="val">Pink</div></div>
    </div>
  </div>
</body>
</html>
