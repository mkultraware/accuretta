<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 24px; background: var(--off-white); }
  .row { display:flex; gap:20px; justify-content:space-between;}
  .item { display:flex; flex-direction:column; gap:10px; align-items:center; flex:1;}
  .box {
    width: 88px;
    height: 64px;
    background: #FBFAF6;
    border-radius: 10px;
  }
  .tok { font-family:var(--font-mono); font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-muted);}
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="tok">xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="tok">sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="tok">md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="tok">lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-pop)"></div><div class="tok">pop</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-inset); background:var(--bg-inset);"></div><div class="tok">inset</div></div>
  </div>
</body>
</html>
