<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px; display:flex; gap:24px; align-items:center;}
  .box { flex:1; height:150px; border-radius:10px; display:flex; align-items:center; justify-content:center; gap:14px; border:1px solid var(--border);}
  .light { background: var(--off-white);}
  .dark { background: var(--off-black);}
  .accent { background: var(--safety-3);}
  img { width: 60px; height: auto; display:block;}
  .wordmark {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.04em;
  }
  .light .wordmark { color: var(--off-black);}
  .dark .wordmark, .accent .wordmark { color: var(--off-white);}
</style>
</head>
<body>
  <div class="box light"><img src="../assets/logo-mark.png" alt=""><span class="wordmark">accuretta</span></div>
  <div class="box dark"><img src="../assets/logo-mark.png" alt=""><span class="wordmark">accuretta</span></div>
  <div class="box accent"><img src="../assets/logo-mark.png" alt=""><span class="wordmark">accuretta</span></div>
</body>
</html>
