<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px;}
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px 18px;}
  .field { display:flex; flex-direction:column; gap:5px;}
  .lbl { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-muted);}
  .input {
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 9px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: #FBFAF6;
    color: var(--fg);
    outline: none;
  }
  .input.focus { border-color: var(--ember-2); box-shadow: 0 0 0 3px rgba(232,129,58,0.15);}
  .input.disabled { opacity: 0.5; background: var(--bg-inset);}
  .input.error { border-color: var(--pink-3); box-shadow: 0 0 0 3px rgba(217,112,153,0.15);}
  .err { font-family:var(--font-mono); font-size:10px; color:var(--pink-3);}
  .hint { font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);}
  .row { display:flex; align-items:center; gap:8px;}
  .chk {
    width:14px; height:14px; border:1px solid var(--border-strong); border-radius:3px;
    display:inline-flex; align-items:center; justify-content:center;
    background: #FBFAF6;
  }
  .chk.on { background: var(--ember-2); border-color: var(--ember-2);}
  .chk.on::after { content: ""; width: 7px; height: 4px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translate(0.5px, -1px);}
  .sw { width: 28px; height: 16px; background: var(--gray-20); border-radius: 999px; position: relative;}
  .sw::after { content:""; width:12px; height:12px; background:#fff; border-radius:999px; position:absolute; top:2px; left:2px; box-shadow: var(--shadow-xs);}
  .sw.on { background: var(--mint-3);}
  .sw.on::after { left: auto; right: 2px;}
</style>
</head>
<body>
  <div class="grid">
    <div class="field">
      <span class="lbl">Default</span>
      <input class="input" value="~/projects/accuretta">
      <span class="hint">Path to working directory</span>
    </div>
    <div class="field">
      <span class="lbl">Focused</span>
      <input class="input focus" value="claude-3-7-sonnet">
      <span class="hint">Model identifier</span>
    </div>
    <div class="field">
      <span class="lbl">Error</span>
      <input class="input error" value="sk-ant-...invalid">
      <span class="err">Key rejected. Check env.</span>
    </div>
    <div class="field">
      <span class="lbl">Disabled · Toggles</span>
      <input class="input disabled" value="Remote execution" disabled>
      <div class="row" style="margin-top:2px;">
        <div class="chk on"></div><span class="hint">Stream tokens</span>
        <div class="chk"></div><span class="hint">Verbose logs</span>
        <div class="sw on"></div><span class="hint">Local only</span>
      </div>
    </div>
  </div>
</body>
</html>
