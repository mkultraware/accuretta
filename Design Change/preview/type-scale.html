<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 28px;}
  table { width:100%; border-collapse:collapse; font-family:var(--font-mono);}
  td { padding:6px 8px; border-bottom:1px dashed var(--border); vertical-align:middle;}
  .tok { font-size:11px; color:var(--fg-muted); letter-spacing:0.1em; text-transform:uppercase; width:70px;}
  .px { font-size:11px; color:var(--fg-faint); width:48px;}
  .sample { color:var(--fg); font-family:var(--font-display); letter-spacing:-0.03em; line-height:1;}
</style>
</head>
<body>
  <table>
    <tr><td class="tok">6xl</td><td class="px">88</td><td class="sample" style="font-size:42px;">Aa Bb 01</td></tr>
    <tr><td class="tok">5xl</td><td class="px">64</td><td class="sample" style="font-size:34px;">Aa Bb 01</td></tr>
    <tr><td class="tok">4xl</td><td class="px">48</td><td class="sample" style="font-size:28px;">Aa Bb 01</td></tr>
    <tr><td class="tok">3xl</td><td class="px">36</td><td class="sample" style="font-size:22px; font-family:var(--font-mono); font-weight:600;">Aa Bb 01</td></tr>
    <tr><td class="tok">2xl</td><td class="px">28</td><td class="sample" style="font-size:18px; font-family:var(--font-mono); font-weight:600;">Aa Bb 01</td></tr>
    <tr><td class="tok">xl</td><td class="px">22</td><td class="sample" style="font-size:14px; font-family:var(--font-mono); font-weight:500;">Aa Bb 01</td></tr>
  </table>
</body>
</html>
