<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px 24px;}
  .pane {
    background: var(--off-black);
    color: var(--off-white);
    border-radius: 8px;
    overflow: hidden;
    font-family: var(--font-mono);
    font-size: 12px;
    box-shadow: var(--shadow-md);
  }
  .tabs { display:flex; background:#0E0E0C; border-bottom:1px solid #2A2A26;}
  .tab { padding: 7px 14px; font-size: 11px; color: var(--gray-30); border-right: 1px solid #2A2A26; display:flex; align-items:center; gap:6px;}
  .tab.active { background: var(--off-black); color: var(--off-white);}
  .tab .dot { width:6px; height:6px; background:var(--safety-3); border-radius:999px;}
  .body { padding: 12px 16px; line-height: 1.7;}
  .ln { color: var(--gray-50); margin-right: 14px; user-select:none; display:inline-block; width:16px; text-align:right;}
  .kw { color: var(--lilac-2);}
  .fn { color: var(--mint-2);}
  .st { color: var(--lemon-2);}
  .cm { color: var(--gray-40); font-style: italic;}
  .vr { color: var(--safety-2);}
  .cursor { display:inline-block; width:7px; height:14px; background:var(--safety-3); vertical-align:-2px; animation: blink 1s steps(2) infinite;}
  @keyframes blink { 50% { opacity: 0;}}
</style>
</head>
<body>
  <div class="pane">
    <div class="tabs">
      <div class="tab active"><span class="dot"></span>agent.ts</div>
      <div class="tab">prerender.tsx</div>
      <div class="tab">config.yml</div>
    </div>
    <div class="body">
      <div><span class="ln">1</span><span class="cm">// stream tokens while planning</span></div>
      <div><span class="ln">2</span><span class="kw">export async function</span> <span class="fn">runAgent</span>(<span class="vr">prompt</span>: string) {</div>
      <div><span class="ln">3</span>&nbsp;&nbsp;<span class="kw">const</span> plan = <span class="kw">await</span> <span class="fn">planner</span>(prompt)<span class="cursor"></span></div>
      <div><span class="ln">4</span>&nbsp;&nbsp;<span class="kw">return</span> <span class="fn">prerender</span>(plan, { mode: <span class="st">"local"</span> })</div>
      <div><span class="ln">5</span>}</div>
    </div>
  </div>
</body>
</html>
